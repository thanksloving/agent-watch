name: WatchApprove
options:
  bundleIdPrefix: com.watchapprove
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  WatchApprove:
    type: application
    platform: iOS
    sources:
      - path: WatchApprove
      - path: ../shared
        group: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchapprove.ios
    dependencies:
      - sdk: libsqlite3.tbd
        implicit: true
      - framework: WatchConnectivity.framework
        implicit: true