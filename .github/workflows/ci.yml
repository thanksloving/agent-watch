name: ci

on:
  push:
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Byte-compile the hook (stdlib only, no deps)
        run: python -m py_compile watch_approve.py
