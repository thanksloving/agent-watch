# macos/project.yml
name: WatchApproveMac
options:
  bundleIdPrefix: com.watchapprove
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: WatchApprove
    INFOPLIST_FILE: WatchApproveMac/Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    COMBINE_HIDPI_IMAGES: YES
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_ENTITLEMENTS: WatchApproveMac/Resources/WatchApprove.entitlements

targets:
  WatchApprove:
    type: application
    platform: macOS
    sources:
      - path: WatchApproveMac
        excludes:
          - "**/*.xcassets"
      - path: WatchApproveMac/Resources/Assets.xcassets
        type: folder
      - path: ../shared
        group: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchapprove.macos
        INFOPLIST_FILE: WatchApproveMac/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: WatchApproveMac/Resources/WatchApprove.entitlements
    dependencies:
      - sdk: WatchConnectivity.framework
        implicit: true
      - sdk: libsqlite3.tbd
        implicit: true
